<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: linear-gradient(to bottom right, rgba(255, 153, 51, 0.8), rgba(255, 255, 255, 0.8));
        }
        nav {
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 10px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.1);
        }
        .hero {
            height: 90vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: fadeIn 2s ease-in-out;
        }
        .card {
            margin: 10px;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s;
        }
        .card:hover {
            transform: translateY(-10px);
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        /* Add more styles for sections, footer, etc */
    </style>
</head>
<body>
    <nav>
        <a href="#about">About</a>
        <a href="#skills">Skills</a>
        <a href="#projects">Projects</a>
        <a href="#contact">Contact</a>
    </nav>
    
    <section class="hero">
        <h1>Welcome to My Portfolio</h1>
        <p>I'm a Web Developer</p>
    </section>
    
    <section id="about" class="card">
        <h2>About Me</h2>
        <p>Details about me...</p>
    </section>

    <section id="skills" class="card">
        <h2>Skills</h2>
        <div>
            <div>HTML</div>
            <div style="width:70%; background: green;">70%</div>
            <div>CSS</div>
            <div style="width:60%; background: green;">60%</div>
            <div>JavaScript</div>
            <div style="width:50%; background: green;">50%</div>
        </div>
    </section>

    <section id="projects" class="card">
        <h2>Projects</h2>
        <p>Details about projects...</p>
    </section>

    <section id="contact" class="card">
        <h2>Contact Me</h2>
        <p>Details about contacting...</p>
    </section>

    <footer>
        <p>&copy; 2026 Your Name</p>
    </footer>
</body>
</html>
